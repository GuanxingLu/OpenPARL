# Two SGLang models sharing one router:
#   - actor:    live policy, receives RL weight updates
#   - subagent: frozen at args.hf_checkpoint, called via assign_task
# The first model listed becomes the live router.
sglang:
  - name: actor
    update_weights: true
    server_groups:
      - worker_type: regular
        num_gpus: 6        # 3 engines × TP=2
  - name: subagent
    # model_path empty -> falls back to args.hf_checkpoint (hard-frozen).
    # For heterogeneous-size ablation, set an explicit path here.
    update_weights: false
    server_groups:
      - worker_type: regular
        num_gpus: 2        # 1 engine × TP=2
        overrides:
          enable_weights_cpu_backup: true
