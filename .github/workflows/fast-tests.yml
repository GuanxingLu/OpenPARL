name: fast-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # tests/ only needs numpy + pytest + openparl (pure-python reward
          # logic). Skip the miles overlay from install.sh — it requires
          # the miles Docker image, which CI doesn't have.
          pip install -e .
      - name: Run fast tests
        run: pytest tests/ -v
